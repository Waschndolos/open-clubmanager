name: Create Finance Feature Tickets

on:
  push:
    branches:
      - copilot/create-club-finance-tickets
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-tickets:
    runs-on: ubuntu-latest
    steps:
      - name: Create finance label and tickets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BODY1: 
          BODY2: 
          BODY3: 
          BODY4: 
          BODY5: 
          BODY6: 
          BODY7: 
          BODY8: 
          BODY9: 
          BODY10: 
        run: |
          set -euo pipefail

          # Ensure the finance label exists (idempotent)
          gh label create "finance" --color "0075ca" --description "Finance feature" --repo "$REPO" 2>/dev/null || true

          # Guard: skip if the first ticket already exists
          EXISTING=$(gh issue list --repo "$REPO" \
            --search "[Finance] Add Transaction database schema in:title" \
            --json number --jq length)
          if [ "$EXISTING" != "0" ]; then
            echo "Finance tickets already exist – skipping."
            exit 0
          fi

          create_issue() {
            local title="$1" labels="$2" body_var="$3"
            echo "${!body_var}" | base64 -d | gh issue create \
              --title "$title" \
              --label "$labels" \
              --body-file - \
              --repo "$REPO"
          }

          create_issue "[Finance] Add Transaction database schema" \
            "feature,finance" BODY1

          create_issue "[Finance] Backend CRUD API for transactions" \
            "feature,finance" BODY2

          create_issue "[Finance] Finance page: display transaction list" \
            "feature,finance,good first issue" BODY3

          create_issue "[Finance] Finance page: add/edit transaction dialog" \
            "feature,finance,good first issue" BODY4

          create_issue "[Finance] Finance page: delete transaction(s)" \
            "feature,finance,good first issue" BODY5

          create_issue "[Finance] Finance overview: summary statistics cards" \
            "feature,finance" BODY6

          create_issue "[Finance] Link transactions to members for fee tracking" \
            "feature,finance" BODY7

          create_issue "[Finance] Transaction category management" \
            "feature,finance" BODY8

          create_issue "[Finance] Export transactions to Excel/CSV" \
            "feature,finance,good first issue" BODY9

          create_issue "[Finance] SEPA direct debit XML export" \
            "feature,finance" BODY10

          echo "All 10 finance tickets created successfully."
